<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" fill="#1E160E"/>

  <!-- Outer gold border -->
  <rect x="16" y="16" width="480" height="480" stroke="#C8A050" stroke-width="1.5" fill="none"/>

  <!-- Inner gold border -->
  <rect x="28" y="28" width="456" height="456" stroke="#C8A050" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Corner ornaments -->
  <line x1="16" y1="80" x2="80" y2="80" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="16" x2="80" y2="80" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>
  <line x1="432" y1="16" x2="432" y2="80" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>
  <line x1="432" y1="80" x2="496" y2="80" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>
  <line x1="16" y1="432" x2="80" y2="432" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="432" x2="80" y2="496" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>
  <line x1="432" y1="432" x2="432" y2="496" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>
  <line x1="432" y1="432" x2="496" y2="432" stroke="#C8A050" stroke-width="0.5" opacity="0.5"/>

  <!-- Top label -->
  <text x="256" y="130" text-anchor="middle" font-family="serif" font-size="28" letter-spacing="12" fill="#C8A050" opacity="0.6">HERDADE EM</text>

  <!-- Main monogram "G" -->
  <text x="256" y="340" text-anchor="middle" font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif" font-size="240" font-weight="300" font-style="italic" fill="#C8A050">G</text>

  <!-- Bottom label -->
  <text x="256" y="420" text-anchor="middle" font-family="serif" font-size="22" letter-spacing="16" fill="#C8A050" opacity="0.5">GRÂNDOLA</text>

  <!-- Thin gold line separator above bottom text -->
  <line x1="160" y1="390" x2="352" y2="390" stroke="#C8A050" stroke-width="0.5" opacity="0.35"/>

  <!-- Bottom subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="sans-serif" font-size="14" letter-spacing="6" fill="#C8A050" opacity="0.3">ALENTEJO · PORTUGAL</text>
</svg>
